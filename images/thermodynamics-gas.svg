<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280">
  <rect width="450" height="280" fill="#f8fafc"/>
  
  <!-- 气缸 -->
  <rect x="50" y="80" width="200" height="150" fill="none" stroke="#64748b" stroke-width="3"/>
  
  <!-- 活塞 -->
  <rect x="50" y="60" width="200" height="20" fill="#3b82f6"/>
  <text x="130" y="75" font-size="14" font-weight="bold" fill="white">活塞</text>
  
  <!-- 气体分子 -->
  <circle cx="80" cy="120" r="6" fill="#ef4444"/>
  <circle cx="120" cy="150" r="6" fill="#10b981"/>
  <circle cx="160" cy="130" r="6" fill="#f59e0b"/>
  <circle cx="200" cy="160" r="6" fill="#3b82f6"/>
  <circle cx="140" cy="180" r="6" fill="#8b5cf6"/>
  <circle cx="180" cy="110" r="6" fill="#ec4899"/>
  <circle cx="100" cy="190" r="6" fill="#14b8a6"/>
  <circle cx="220" cy="140" r="6" fill="#f97316"/>
  
  <!-- 分子运动轨迹 -->
  <path d="M75,115 Q85,130 75,145" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M115,145 Q125,160 115,175" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M155,125 Q165,140 155,155" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- 温度计 -->
  <rect x="300" y="60" width="30" height="140" fill="#fef3c7" rx="15"/>
  <rect x="305" y="100" width="20" height="95" fill="#ef4444"/>
  <text x="305" y="50" font-size="14" font-weight="bold" fill="#1e293b">T</text>
  <text x="340" y="180" font-size="14" fill="#ef4444">高温</text>
  <text x="340" y="70" font-size="14" fill="#3b82f6">低温</text>
  
  <!-- 箭头表示加热 -->
  <path d="M330,130 L330,110" stroke="#ef4444" stroke-width="2"/>
  <polygon points="330,105 326,115 334,115" fill="#ef4444"/>
  
  <!-- 状态方程 -->
  <rect x="280" y="220" width="160" height="50" fill="#e0e7ff" rx="8"/>
  <text x="300" y="245" font-size="16" font-weight="bold" fill="#1e293b">PV = nRT</text>
  <text x="295" y="262" font-size="12" fill="#64748b">理想气体状态方程</text>
  
  <!-- 标题 -->
  <text x="100" y="30" font-size="18" font-weight="bold" fill="#1e293b">气体分子动理论</text>
  
  <!-- 说明 -->
  <text x="50" y="260" font-size="12" fill="#64748b">温度越高，分子运动越剧烈</text>
</svg>
