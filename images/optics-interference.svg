<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f8fafc"/>
  
  <!-- 光源 -->
  <rect x="20" y="130" width="40" height="40" fill="#fef3c7"/>
  <text x="30" y="155" font-size="12" font-weight="bold" fill="#f59e0b">光源</text>
  
  <!-- 单缝 -->
  <rect x="80" y="100" width="10" height="100" fill="#1e293b"/>
  <text x="70" y="95" font-size="12" fill="#1e293b">单缝</text>
  
  <!-- 双缝 -->
  <rect x="180" y="100" width="8" height="40" fill="#3b82f6"/>
  <rect x="180" y="160" width="8" height="40" fill="#3b82f6"/>
  <text x="165" y="95" font-size="12" fill="#3b82f6">双缝</text>
  
  <!-- 光线 -->
  <line x1="90" y1="130" x2="188" y2="120" stroke="#f59e0b" stroke-width="1"/>
  <line x1="90" y1="150" x2="188" y2="120" stroke="#f59e0b" stroke-width="1"/>
  <line x1="90" y1="170" x2="188" y2="180" stroke="#f59e0b" stroke-width="1"/>
  
  <line x1="188" y1="120" x2="450" y2="80" stroke="#f59e0b" stroke-width="1"/>
  <line x1="188" y1="120" x2="450" y2="140" stroke="#f59e0b" stroke-width="1"/>
  <line x1="188" y1="180" x2="450" y2="200" stroke="#f59e0b" stroke-width="1"/>
  <line x1="188" y1="180" x2="450" y2="220" stroke="#f59e0b" stroke-width="1"/>
  
  <!-- 干涉条纹 -->
  <rect x="380" y="70" width="120" height="5" fill="#fbbf24"/>
  <rect x="380" y="90" width="120" height="5" fill="#f8fafc"/>
  <rect x="380" y="110" width="120" height="5" fill="#fbbf24"/>
  <rect x="380" y="130" width="120" height="5" fill="#f8fafc"/>
  <rect x="380" y="150" width="120" height="5" fill="#fbbf24"/>
  <rect x="380" y="170" width="120" height="5" fill="#f8fafc"/>
  <rect x="380" y="190" width="120" height="5" fill="#fbbf24"/>
  <rect x="380" y="210" width="120" height="5" fill="#f8fafc"/>
  <rect x="380" y="230" width="120" height="5" fill="#fbbf24"/>
  
  <!-- 条纹标注 -->
  <text x="395" y="65" font-size="10" fill="#f59e0b">明纹</text>
  <text x="395" y="105" font-size="10" fill="#94a3b8">暗纹</text>
  <text x="395" y="145" font-size="10" fill="#f59e0b">明纹</text>
  <text x="395" y="225" font-size="10" fill="#f59e0b">明纹</text>
  
  <!-- 公式 -->
  <rect x="10" y="10" width="200" height="80" fill="#e0e7ff" rx="8"/>
  <text x="20" y="35" font-size="14" font-weight="bold" fill="#1e293b">双缝干涉条纹间距:</text>
  <text x="20" y="60" font-size="16" font-weight="bold" fill="#3b82f6">Δx = λL/d</text>
  <text x="20" y="80" font-size="12" fill="#64748b">λ:波长, L:屏距, d:缝距</text>
  
  <!-- 明暗纹条件 -->
  <rect x="230" y="10" width="220" height="80" fill="#fef3c7" rx="8"/>
  <text x="240" y="35" font-size="14" font-weight="bold" fill="#1e293b">干涉条件:</text>
  <text x="240" y="55" font-size="13" fill="#10b981">明纹: Δs = kλ (k=0,1,2...)</text>
  <text x="240" y="75" font-size="13" fill="#ef4444">暗纹: Δs = (2k+1)λ/2</text>
  
  <!-- 标题 -->
  <text x="180" y="280" font-size="16" font-weight="bold" fill="#1e293b">光的双缝干涉实验</text>
</svg>
