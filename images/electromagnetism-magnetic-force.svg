<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 280">
  <rect width="450" height="280" fill="#f8fafc"/>
  
  <!-- 磁铁 -->
  <rect x="30" y="100" width="60" height="80" fill="#ef4444"/>
  <text x="50" y="145" font-size="16" font-weight="bold" fill="white">N</text>
  <rect x="90" y="100" width="60" height="80" fill="#3b82f6"/>
  <text x="110" y="145" font-size="16" font-weight="bold" fill="white">S</text>
  
  <!-- 磁场线 (从N到S) -->
  <path d="M60,100 Q100,30 180,30 Q260,30 300,100" fill="none" stroke="#10b981" stroke-width="2"/>
  <path d="M60,140 Q100,70 180,70 Q260,70 300,140" fill="none" stroke="#10b981" stroke-width="2"/>
  <path d="M60,180 Q100,220 180,220 Q260,220 300,180" fill="none" stroke="#10b981" stroke-width="2"/>
  
  <!-- 磁场线箭头 -->
  <polygon points="180,28 175,40 185,40" fill="#10b981"/>
  <polygon points="180,68 175,80 185,80" fill="#10b981"/>
  <polygon points="180,222 175,210 185,210" fill="#10b981"/>
  
  <!-- 导线 -->
  <line x1="200" y1="50" x2="200" y2="230" stroke="#1e293b" stroke-width="6"/>
  
  <!-- 电流符号 (远离我们) -->
  <circle cx="200" cy="140" r="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="193" y="145" font-size="14" font-weight="bold" fill="#f59e0b">×</text>
  <text x="210" y="145" font-size="14" fill="#f59e0b">I</text>
  
  <!-- 导线电流方向 -->
  <text x="215" y="50" font-size="12" fill="#f59e0b">电流向外</text>
  
  <!-- 安培力方向 -->
  <line x1="230" y1="140" x2="350" y2="140" stroke="#ef4444" stroke-width="3"/>
  <polygon points="355,140 342,135 342,145" fill="#ef4444"/>
  <text x="360" y="145" font-size="14" font-weight="bold" fill="#ef4444">F</text>
  
  <!-- 左手定则图示 -->
  <rect x="280" y="200" width="150" height="70" fill="#fef3c7" rx="8"/>
  <text x="290" y="220" font-size="13" font-weight="bold" fill="#1e293b">左手定则:</text>
  <text x="290" y="240" font-size="12" fill="#3b82f6">磁场→手心</text>
  <text x="290" y="260" font-size="12" fill="#3b82f6">电流→四指</text>
  <text x="380" y="240" font-size="12" fill="#ef4444">F为拇指</text>
  
  <!-- 标题 -->
  <text x="160" y="25" font-size="18" font-weight="bold" fill="#1e293b">磁场对电流的作用 (安培力)</text>
</svg>
